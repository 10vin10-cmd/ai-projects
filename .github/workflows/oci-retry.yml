name: Retry Oracle Cloud Instance Creation

on:
  schedule:
    # Runs at the top of every hour
    - cron: '0 * * * *'
  workflow_dispatch: {}   # lets you also trigger it manually from the Actions tab

jobs:
  apply-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Install OCI CLI
        run: |
          pip install oci-cli

      - name: Configure OCI CLI credentials
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_OCID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=${{ secrets.OCI_REGION }}"
            echo "key_file=$HOME/.oci/oci_api_key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config
          cat ~/.oci/config

      - name: Trigger Resource Manager Apply job
        run: |
          oci resource-manager job create-apply-job \
            --stack-id "${{ secrets.OCI_STACK_ID }}" \
            --execution-plan-strategy AUTO_APPROVED \
            || echo "Apply job failed or capacity unavailable — will retry next scheduled run."
